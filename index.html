<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>HOLA</h1>
    <main>
      <section>
        <form id="repeatForm">
          <label for="text">Texto a repetir:</label>
          <input type="text" id="text" name="text" required />
          <br />
          <label for="times">Número de repeticiones:</label>
          <input type="number" id="times" name="times" min="1" required />
          <br />
          <button type="submit" id="repeatButton">Repetir</button>
        </form>
        <div id="resultContainer">
          <p id="result">Resultado :</p>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
